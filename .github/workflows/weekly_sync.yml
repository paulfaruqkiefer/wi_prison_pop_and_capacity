name: WI Prison Stats Sync

on:
  schedule:
    # This runs at 18:00 UTC (1:00 PM CST) every Friday
    - cron: '0 18 * * 5'
  workflow_dispatch: # Allows you to trigger it manually from the "Actions" tab

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Allows the bot to commit the updated CSV back to your repo
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y tesseract-ocr poppler-utils

      - name: Install Python Libraries
        run: |
          pip install pandas pytesseract pdf2image requests beautifulsoup4

      - name: Run Update Script
        run: python update_master.py

      - name: Commit and Push Changes
        run: |
          git config --global user.name "GitHub Action Bot"
          git config --global user.email "actions@github.com"
          git add wi_prison_stats_master.csv backups/
          # Only commit if there are actually changes to avoid workflow errors
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-update: $(date +'%Y-%m-%d')" && git push)
